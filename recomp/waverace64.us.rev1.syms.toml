# Wave Race 64 (USA Rev 1) Symbol File for N64Recomp
#
# This file defines all code sections and their functions for the recompiler.
# Generated from the Wave Race 64 decomp project.
#
# Format reference (from N64Recomp source):
#   [[section]]
#   rom = 0x...        # ROM offset of section start
#   vram = 0x...       # Virtual RAM address at runtime  
#   size = ...         # Section size in bytes
#   name = "..."       # Section name (must match overlay list)
#
#   [[section.functions]]
#   name = "func_name"  # Function symbol name
#   vram = 0x...        # Function VRAM address
#   size = ...          # Function size in bytes
#
#   [[section.relocs]]  # Only for relocatable overlay sections
#   vram = 0x...        # Address of instruction with relocation
#   target_vram = 0x... # Target address of relocation
#   type = "R_MIPS_HI16" | "R_MIPS_LO16" | "R_MIPS_26" | "R_MIPS_32"
#
# TODO: This file needs to be generated from the decomp project.
# A script should be created to:
#   1. Parse symbol_addrs.txt, libultra_symbols.txt, ovl_symbols.txt
#   2. Determine function sizes from adjacent symbol addresses or ELF data
#   3. Map functions to their correct sections (main code vs overlays)
#   4. Extract relocation data for overlay sections
#
# The main code section spans from entry point to overlay load area.
# All 19 overlays load to VRAM 0x802C5800 (mutually exclusive).

# =============================================================================
# Main code section (placeholder - needs function enumeration)
# =============================================================================
[[section]]
rom = 0x00001000
vram = 0x80000400
size = 0x001B1FB0    # From ROM start to first overlay
name = ".text"

# TODO: Populate with all functions from symbol_addrs.txt and libultra_symbols.txt
# Example entries:
# [[section.functions]]
# name = "main_thread"
# vram = 0x80047530
# size = 0x100  # Must be determined from decomp

# =============================================================================
# Overlay sections (all load to VRAM 0x802C5800, relocatable)
# =============================================================================

# NOTE: Each overlay section below needs:
# 1. Functions enumerated from ovl_symbols.txt and decomp source
# 2. Relocation entries extracted from the ROM or ELF
# Size = romEnd - romStart for each overlay

